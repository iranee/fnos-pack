# =============================================================
# Build fnOS fpk — 通用多应用打包 CI
# =============================================================
# 自动发现 apps/ 下所有含 manifest 的子目录。
# 每个应用独立检查、下载、打包、发布 Draft Release。
# =============================================================

name: Build fnOS fpk

on:
  workflow_dispatch:
    inputs:
      app:
        description: '应用名（留空则构建所有应用）'
        required: false
        default: ''
      version:
        description: '版本号（留空使用 manifest 中的版本）'
        required: false
        default: ''
      force:
        description: '强制重新构建（即使 Release 已存在）'
        required: false
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Init
        run: |
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"
          sudo timedatectl set-timezone "Asia/Shanghai"

      # ---- 发现应用 ----
      - name: Discover Apps
        id: discover
        run: |
          APP_FILTER="${{ inputs.app }}"
          APPS_BASE="apps"

          if [ -n "$APP_FILTER" ]; then
            [ -d "$APPS_BASE/$APP_FILTER" ] || { echo "::error::目录不存在: apps/$APP_FILTER"; exit 1; }
            [ -f "$APPS_BASE/$APP_FILTER/manifest" ] || { echo "::error::apps/$APP_FILTER 缺少 manifest"; exit 1; }
            APPS="$APP_FILTER"
          else
            APPS=""
            for dir in "$APPS_BASE"/*/; do
              [ -f "$dir/manifest" ] && APPS="$APPS $(basename "$dir")"
            done
            APPS=$(echo "$APPS" | xargs)
            [ -n "$APPS" ] || { echo "::error::apps/ 下未找到含 manifest 的应用目录"; exit 1; }
          fi

          echo "apps=$APPS" >> "$GITHUB_OUTPUT"
          echo "发现应用: $APPS"

      # ---- 设置 fnpack ----
      - name: Setup fnpack
        run: |
          FNPACK_URL="https://static2.fnnas.com/fnpack/fnpack-1.0.4-linux-amd64"
          curl -fsSL "$FNPACK_URL" -o fnpack
          chmod +x fnpack
          echo "fnpack 已就绪"

      # ---- 逐应用：检查 → 构建 → 发布 ----
      - name: Build & Release
        id: build
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          APPS="${{ steps.discover.outputs.apps }}"
          VERSION_OVERRIDE="${{ inputs.version }}"
          FORCE="${{ inputs.force }}"
          DIST_DIR="$GITHUB_WORKSPACE/dist"
          FNPACK="$GITHUB_WORKSPACE/fnpack"
          mkdir -p "$DIST_DIR"

          # 架构列表
          ARCHS=("x86" "arm")
          declare -A ARCH_DIR=( ["x86"]="x86_64" ["arm"]="arm64" )

          BUILT_SUMMARY=""
          SKIPPED_SUMMARY=""

          for APP_NAME in $APPS; do
            echo ""
            echo "════════════════════════════════════════"
            echo "  $APP_NAME"
            echo "════════════════════════════════════════"

            APP_DIR="$GITHUB_WORKSPACE/apps/$APP_NAME"

            # 读取 manifest
            M_APPNAME=$(grep "^appname" "$APP_DIR/manifest" | awk -F'=' '{print $2}' | tr -d ' ')
            M_VERSION=$(grep "^version" "$APP_DIR/manifest" | awk -F'=' '{print $2}' | tr -d ' ')
            [ -n "$VERSION_OVERRIDE" ] && M_VERSION="$VERSION_OVERRIDE"

            if [ -z "$M_APPNAME" ] || [ -z "$M_VERSION" ]; then
              echo "::warning::$APP_NAME: manifest 缺少 appname 或 version，跳过"
              continue
            fi

            APP_TAG="${M_APPNAME}_v${M_VERSION}"
            echo "  Tag: $APP_TAG"

            # ---- 检查 Release 是否已存在 ----
            if [ "$FORCE" != "true" ] && gh release view "$APP_TAG" &>/dev/null; then
              echo "  Release $APP_TAG 已存在，跳过"
              SKIPPED_SUMMARY="$SKIPPED_SUMMARY\n- \`$APP_TAG\` — Release 已存在"
              continue
            fi

            echo "  版本: v${M_VERSION}"

            # ---- 执行 download.sh（如果有）----
            if [ -x "$APP_DIR/download.sh" ] || [ -f "$APP_DIR/download.sh" ]; then
              echo "  执行 download.sh 下载二进制..."
              (cd "$APP_DIR" && bash download.sh "$M_VERSION") || echo "::warning::$APP_NAME: download.sh 执行失败"
            fi

            # ---- 逐架构打包 ----
            APP_FPK_FILES=""

            for PLATFORM in "${ARCHS[@]}"; do
              BIN_ARCH_DIR="${ARCH_DIR[$PLATFORM]}"

              echo ""
              echo "  [$PLATFORM] 构建中..."

              # 清理残留
              find "$APP_DIR/app" -maxdepth 1 -type f -executable \
                ! -path "*/bin/*" ! -path "*/ui/*" -delete 2>/dev/null || true

              # 复制二进制
              if [ -d "$APP_DIR/$BIN_ARCH_DIR" ] && [ "$(ls -A "$APP_DIR/$BIN_ARCH_DIR" 2>/dev/null)" ]; then
                cp "$APP_DIR/$BIN_ARCH_DIR/"* "$APP_DIR/app/" 2>/dev/null || true
                chmod +x "$APP_DIR/app/"* 2>/dev/null || true
                echo "  [$PLATFORM] 已复制 $BIN_ARCH_DIR/ → app/"
              else
                echo "::warning::  [$PLATFORM] $BIN_ARCH_DIR/ 不存在或为空"
              fi

              # 更新 manifest
              sed -i "s/^version.*=.*/version               = ${M_VERSION}/" "$APP_DIR/manifest"
              sed -i "s/^platform.*=.*/platform              = ${PLATFORM}/" "$APP_DIR/manifest"

              # fnpack build
              cd "$APP_DIR"
              "$FNPACK" build --directory "$APP_DIR"

              # 移动输出
              SOURCE_FPK="$APP_DIR/${M_APPNAME}.fpk"
              if [ -f "$SOURCE_FPK" ]; then
                FPK_NAME="fnos-${M_APPNAME}_${PLATFORM}_v${M_VERSION}.fpk"
                mv "$SOURCE_FPK" "$DIST_DIR/$FPK_NAME"
                SIZE=$(du -h "$DIST_DIR/$FPK_NAME" | cut -f1)
                echo "  [$PLATFORM] ✓ $FPK_NAME ($SIZE)"
                APP_FPK_FILES="$APP_FPK_FILES $FPK_NAME"
              else
                echo "::error::  [$PLATFORM] fnpack 未生成 fpk"
              fi

              # 清理
              find "$APP_DIR/app" -maxdepth 1 -type f -executable \
                ! -path "*/bin/*" ! -path "*/ui/*" -delete 2>/dev/null || true
            done

            # 恢复 manifest platform
            sed -i "s/^platform.*=.*/platform              = x86/" "$APP_DIR/manifest"

            APP_FPK_FILES=$(echo "$APP_FPK_FILES" | xargs)
            [ -z "$APP_FPK_FILES" ] && { echo "  无构建产物，跳过发布"; continue; }

            # ---- 创建独立 Draft Release ----
            RELEASE_BODY="$(cat <<REOF
## ${M_APPNAME}

| 文件 | 架构 | 大小 |
|------|------|------|
REOF
)"
            for fpk in $APP_FPK_FILES; do
              ARCH=$(echo "$fpk" | grep -oP '_(x86|arm)_v' | tr -d '_v')
              FSIZE=$(du -h "$DIST_DIR/$fpk" | cut -f1)
              RELEASE_BODY="$RELEASE_BODY
| \`$fpk\` | $ARCH | $FSIZE |"
            done
            RELEASE_BODY="$RELEASE_BODY

---
Commit: ${{ github.sha }}"

            # 收集 fpk 完整路径
            FPK_PATHS=""
            for fpk in $APP_FPK_FILES; do
              FPK_PATHS="$FPK_PATHS $DIST_DIR/$fpk"
            done

            echo ""
            echo "  创建 Draft Release: $APP_TAG"
            if gh release create "$APP_TAG" $FPK_PATHS \
                --draft \
                --title "$APP_TAG" \
                --notes "$RELEASE_BODY"; then
              echo "  ✓ Draft Release 已创建"
              BUILT_SUMMARY="$BUILT_SUMMARY\n- \`$APP_TAG\` ($(echo $APP_FPK_FILES | wc -w) 个文件)"
            else
              echo "::error::  创建 Release 失败"
            fi
          done

          # 输出摘要
          echo ""
          echo "════════════════════════════════════════"
          echo "  汇总"
          echo "════════════════════════════════════════"
          if [ -n "$BUILT_SUMMARY" ]; then
            echo -e "  已构建:$BUILT_SUMMARY"
          fi
          if [ -n "$SKIPPED_SUMMARY" ]; then
            echo -e "  已跳过:$SKIPPED_SUMMARY"
          fi

          # 输出给 Summary 步骤（用文件传递，避免多行 output 问题）
          echo -e "$BUILT_SUMMARY" > /tmp/built_summary.txt
          echo -e "$SKIPPED_SUMMARY" > /tmp/skipped_summary.txt

      # ---- 摘要 ----
      - name: Summary
        run: |
          echo "### 构建结果" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          BUILT=$(cat /tmp/built_summary.txt 2>/dev/null)
          SKIPPED=$(cat /tmp/skipped_summary.txt 2>/dev/null)

          if [ -n "$BUILT" ]; then
            echo "**已构建:**" >> $GITHUB_STEP_SUMMARY
            echo "$BUILT" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
          fi

          if [ -n "$SKIPPED" ]; then
            echo "**已跳过:**" >> $GITHUB_STEP_SUMMARY
            echo "$SKIPPED" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
          fi

          if [ -z "$BUILT" ] && [ -z "$SKIPPED" ]; then
            echo "无应用需要构建" >> $GITHUB_STEP_SUMMARY
          fi

          echo "**[Draft Releases](https://github.com/${{ github.repository }}/releases)** — 请手动确认后发布" >> $GITHUB_STEP_SUMMARY
